name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/chitchat-app:latest

  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Production Compose and Nginx to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.prod.yml,docker/**"
          target: "/home/atabik/chitchat-prod"

      - name: SSH to VPS and Update Container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            mkdir -p /home/atabik/chitchat-prod
            cd /home/atabik/chitchat-prod

            # Buat file .env produksi secara dinamis
            echo "APP_NAME=ChitChat_Production" > .env
            echo "APP_ENV=production" >> .env
            echo "APP_KEY=${{ secrets.APP_KEY }}" >> .env
            echo "APP_DEBUG=false" >> .env
            echo "APP_URL=https://chitchat.atabikm.me" >> .env
            echo "DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}" >> .env

            # Database
            echo "DB_CONNECTION=mysql" >> .env
            echo "DB_HOST=db" >> .env
            echo "DB_PORT=3306" >> .env
            echo "DB_DATABASE=${{ secrets.DB_DATABASE }}" >> .env
            echo "DB_USERNAME=root" >> .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env

            # Drivers (Penting: Ubah queue ke redis!)
            echo "CACHE_DRIVER=redis" >> .env
            echo "SESSION_DRIVER=file" >> .env
            echo "QUEUE_CONNECTION=redis" >> .env

            # Redis Configuration
            echo "REDIS_HOST=redis" >> .env
            echo "REDIS_PORT=6379" >> .env

            # Reverb Internal Server Config (PHP Backend menembak kontainer ini)
            echo "REVERB_SERVER_HOST=0.0.0.0" >> .env
            echo "REVERB_SERVER_PORT=8080" >> .env
            echo "REVERB_HOST=chitchat.atabikm.me" >> .env
            echo "REVERB_PORT=443" >> .env
            echo "REVERB_SCHEME=https" >> .env
            echo "REVERB_APP_ID=${{ secrets.REVERB_APP_ID }}" >> .env
            echo "REVERB_APP_KEY=${{ secrets.REVERB_APP_KEY }}" >> .env
            echo "REVERB_APP_SECRET=${{ secrets.REVERB_APP_SECRET }}" >> .env

            # Sisi Client / Vite Configuration (Wajib terbaca oleh JavaScript browser)
            echo "VITE_REVERB_APP_KEY=${{ secrets.REVERB_APP_KEY }}" >> .env
            echo "VITE_REVERB_HOST=chitchat.atabikm.me" >> .env
            echo "VITE_REVERB_PORT=443" >> .env
            echo "VITE_REVERB_SCHEME=https" >> .env

            # Siklus penyiapan container
            docker compose --env-file .env -f docker-compose.prod.yml down -v
            docker compose --env-file .env -f docker-compose.prod.yml pull
            docker compose --env-file .env -f docker-compose.prod.yml up -d --force-recreate

            # Berikan waktu lebih lama bagi MySQL untuk inisialisasi awal database
            echo "Waiting for backend and database storage initialization..."
            sleep 20

            # Jalankan optimasi cache sebelum migrasi untuk memastikan konfigurasi bersih terpanggil
            docker exec chitchat_app_production php artisan config:clear
            docker exec chitchat_app_production php artisan cache:clear
            docker exec chitchat_app_production php artisan view:clear

            # Eksekusi database migration dan seed
            docker exec chitchat_app_production php artisan migrate --force
            docker exec chitchat_app_production php artisan db:seed --force

            # Bersihkan cache image lama
            docker image prune -f
