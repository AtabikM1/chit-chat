server {
    listen 80;
    server_name chitchat.atabikm.me;

    error_log  /var/log/nginx/chitchat_error.log;
    access_log /var/log/nginx/chitchat_access.log;

    # Certbot ACME Challenge Path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /var/www/chitchat/public;
    index index.php index.html;

    # 1. ATURAN PENGALIHAN WEBSOCKET REVERB
    # Ketika Laravel Echo memanggil rute /app/ dari browser, oper ke container reverb
    location /app/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cegah Nginx memutus paksa koneksi idle WebSocket dalam waktu singkat
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # 2. HALAMAN WEB REGULER
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
