# 1. PENGALIHAN OTOMATIS HTTP KE HTTPS
server {
    listen 80;
    server_name chitchat.atabikm.me;

    # Certbot ACME Challenge Path (Tetap biarkan di port 80)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. SERVER UTAMA (HTTPS PRODUCTION)
server {
    listen 443 ssl; # Sesuai dengan konfigurasi VITE_REVERB_PORT=443
    server_name chitchat.atabikm.me;

    # Jalur Sertifikat SSL (Sesuaikan dengan lokasi penyimpanan Certbot kamu di VPS)
    ssl_certificate /etc/letsencrypt/live/chitchat.atabikm.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/chitchat.atabikm.me/privkey.pem;

    error_log  /var/log/nginx/chitchat_error.log;
    access_log /var/log/nginx/chitchat_access.log;

    root /var/www/chitchat/public;
    index index.php index.html;

    # ATURAN PENGALIHAN WEBSOCKET & API REVERB (Menggunakan Regex agar menangkap /app/ dan /apps/)
    location ~ ^/(app|apps)/ {
        # DIUBAH: Menembak langsung nama container produksi sesuai compose.prod.yml
        proxy_pass http://chitchat_reverb_production:8080;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # HALAMAN WEB REGULER
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        # Pastikan nama container backend sesuai (chitchat_app_production)
        # Jika nginx ini berjalan di dalam container yang sama dengan network bridge compose.
        fastcgi_pass chitchat_app_production:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}
