version: '3.8'

services:
  app:
    image: ${DOCKERHUB_USERNAME}/chitchat-app:latest  # Menggunakan image hasil build CI/CD
    container_name: chitchat_app_production
    restart: unless-stopped
    working_dir: /var/www/chitchat
    volumes:
      - chitchat_assets:/var/www/chitchat  # Share code ke volume
    networks:
      - chitchat_network
    depends_on:
      db:
        condition: service_healthy

  webserver:
    image: nginx:alpine
    container_name: chitchat_webserver_production
    restart: unless-stopped
    ports:
      - "8080:80"  # Sesuai dengan port di docker ps kamu
    volumes:
      - chitchat_assets:/var/www/chitchat  # Nginx membaca dari volume yang sama
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - chitchat_network
    depends_on:
      - app

  db:
  # ... konfigurasi db tetap sama

networks:
  chitchat_network:
    driver: bridge

volumes:
  mysql_data:
  chitchat_assets:  # Deklarasikan volume bersama di sini
